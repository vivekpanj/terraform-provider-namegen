name: Build Terraform Provider

on:
  push:
    paths:
      - 'module/name-generator-provider/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build provider
        run: |
          cd module/name-generator-provider
          go mod download
          go build -o terraform-provider-namegen.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-namegen
          path: module/name-generator-provider/terraform-provider-namegen.exe