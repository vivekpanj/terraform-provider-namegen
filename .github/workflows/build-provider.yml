name: Build Terraform Provider

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow creating releases and pushing tags

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for version detection

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Tidy Go modules
        run: go mod tidy

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            # Manual tag release
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
          else
            # Auto-release from main - use timestamp-based version
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            # Extract version numbers
            VERSION_NUM=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION_NUM | cut -d. -f1)
            MINOR=$(echo $VERSION_NUM | cut -d. -f2)
            PATCH=$(echo $VERSION_NUM | cut -d. -f3)
            # Auto-increment patch version
            NEW_PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
            # Create and push the new tag
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "Auto-release $VERSION"
            git push origin "$VERSION"
          fi
        
      - name: Build Linux binary
        run: |
          go mod download
          go build -ldflags="-X 'main.version=${{ steps.get_version.outputs.VERSION }}'" -o terraform-provider-namegen

      - name: Build Windows binary
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-X 'main.version=${{ steps.get_version.outputs.VERSION }}'" -o terraform-provider-namegen.exe

      - name: Build macOS AMD64 binary
        run: |
          GOOS=darwin GOARCH=amd64 go build -ldflags="-X 'main.version=${{ steps.get_version.outputs.VERSION }}'" -o terraform-provider-namegen_darwin_amd64

      - name: Build macOS ARM64 binary
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags="-X 'main.version=${{ steps.get_version.outputs.VERSION }}'" -o terraform-provider-namegen_darwin_arm64

      - name: Zip Linux binary
        run: |
          zip terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_linux_amd64.zip terraform-provider-namegen

      - name: Zip Windows binary
        run: |
          zip terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_windows_amd64.zip terraform-provider-namegen.exe

      - name: Zip macOS AMD64 binary
        run: |
          zip terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_darwin_amd64.zip terraform-provider-namegen_darwin_amd64

      - name: Zip macOS ARM64 binary
        run: |
          zip terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_darwin_arm64.zip terraform-provider-namegen_darwin_arm64

      - name: Generate SHA256SUMS
        run: |
          sha256sum terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_*.zip > terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_SHA256SUMS

      - name: Upload Linux zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_linux_amd64.zip
          path: terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_linux_amd64.zip

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_windows_amd64.zip
          path: terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_windows_amd64.zip

      - name: Upload macOS AMD64 zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_darwin_amd64.zip
          path: terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_darwin_amd64.zip

      - name: Upload macOS ARM64 zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_darwin_arm64.zip
          path: terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_darwin_arm64.zip

      - name: Upload SHA256SUMS
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_SHA256SUMS
          path: terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_SHA256SUMS

      - name: Create GitHub Release
        if: steps.get_version.outputs.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          files: |
            terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_linux_amd64.zip
            terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_windows_amd64.zip
            terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_darwin_amd64.zip
            terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_darwin_arm64.zip
            terraform-provider-namegen_${{ steps.get_version.outputs.VERSION }}_SHA256SUMS
          generate_release_notes: true